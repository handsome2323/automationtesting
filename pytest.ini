# pytest.ini - pytest配置文件
# 定义pytest的全局配置选项

[pytest]
# 测试文件的搜索模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 添加命令行参数
addopts = 
    -v                           # 显示详细输出
    -s                           # 显示print输出
    --tb=short                   # 简短的traceback格式
    --strict-markers             # 严格检查markers定义
    --disable-warnings           # 禁用警告

# 测试超时（秒）
timeout = 30

# 最小Python版本
minversion = 3.8

# 指定测试路径
testpaths = tests

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
